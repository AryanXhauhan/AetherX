version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aetherx-postgres
    restart: always
    environment:
      POSTGRES_USER: aetherx_user
      POSTGRES_PASSWORD: aetherx_secret
      POSTGRES_DB: aetherx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aetherx-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
